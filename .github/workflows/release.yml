name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish bhl.csproj -c Release

      - name: Zip
        run: |
          cd build/bhl/Release/net8.0/publish
          zip -r ${{ github.workspace }}/bhl-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bhl-${{ github.ref_name }}.zip
          generate_release_notes: true
