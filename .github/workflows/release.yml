name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run benchmarks
        run: make bench

      - name: Write benchmark summary
        run: |
          echo "## Benchmark results for ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          cat bench/BenchmarkDotNet.Artifacts/results/*-report-github.md >> $GITHUB_STEP_SUMMARY

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish bhl.csproj -c Release

      - name: Zip
        run: |
          cd build/bhl/Release/net8.0/publish
          zip -r ${{ github.workspace }}/bhl-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bhl-${{ github.ref_name }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
